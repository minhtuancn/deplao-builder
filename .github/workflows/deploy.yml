name: Deploy to GitHub Pages (disabled)

# Workflow này không dùng cho Electron app — tắt hoàn toàn
# Chỉ có thể chạy thủ công nếu cần (không bao giờ trigger tự động)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Workflow này đã bị tắt, không dùng cho Electron app'
        required: true
        default: 'no'

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: ℹ️ Workflow disabled
        run: echo "This workflow is disabled. Deplao is an Electron desktop app, not a GitHub Pages site."
